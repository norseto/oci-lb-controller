name: 'Tag Release'

on:
  push:
    branches:
      - main
      - 'release-*'
    paths:
      - version.go

jobs:
  build-and-push:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    outputs:
      tag: ${{ steps.image-meta.outputs.tag }}
      gitversion: ${{ steps.image-meta.outputs.gitversion }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4
      - run: hack/tag-release.sh --validate-only
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: image-meta
        run: |
          tag="v$(hack/get-version.sh)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "gitversion=${tag}" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64,linux/amd64
          tags: norseto/oci-lb-registrar:${{ steps.image-meta.outputs.tag }}
          build-args: |
            MODULE_PACKAGE=github.com/norseto/oci-lb-controller
            GITVERSION=${{ steps.image-meta.outputs.gitversion }}
          provenance: true
          sbom: true

  sign-and-tag:
    needs: build-and-push
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - run: /usr/bin/git config --global user.email actions@github.com
      - run: /usr/bin/git config --global user.name 'GitHub Actions Release Tagger'
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: |
          if [ -z "${DIGEST}" ]; then
            echo "build-and-push digest output is empty"
            exit 1
          fi

          cosign sign --yes "norseto/oci-lb-registrar@${DIGEST}"
        env:
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
      - run: hack/tag-release.sh
